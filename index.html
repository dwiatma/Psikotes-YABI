<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psikotes Rekrutmen Yayasan Badak Indonesia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay"></div>

<div class="container py-5">

    <div class="card shadow-lg main-card">

        <div class="text-center mb-4">
            <img src="logo-yabi.png" class="logo">
            <h1>PSIKOTES REKRUTMEN</h1>
            <h3>Yayasan Badak Indonesia</h3>
            <p class="text-muted">
                Big Five Personality Inventory
            </p>
        </div>

        <!-- Identitas -->
        <div id="identitySection">

            <h4>Data Peserta</h4>

            <div class="mb-3">
                <label>Nama Lengkap</label>
                <input type="text" class="form-control" id="nama">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" id="email">
            </div>

            <div class="mb-3">
                <label>Jenis Kelamin</label>
                <select class="form-select" id="gender">
                    <option>Laki-laki</option>
                    <option>Perempuan</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Pendidikan Terakhir</label>
                <input type="text" class="form-control" id="pendidikan">
            </div>

            <div class="mb-3">
                <label>Tanggal Lahir</label>
                <input type="date" class="form-control" id="tgllahir">
            </div>

            <button class="btn btn-success w-100" onclick="startTest()">
                Mulai Tes
            </button>

        </div>

        <!-- Soal -->
        <div id="questionSection" style="display:none">

            <h5 id="nomorSoal"></h5>

            <div class="progress mb-4">
                <div class="progress-bar bg-success"
                     id="progressBar"
                     role="progressbar"
                     style="width:0%">
                </div>
            </div>

            <div class="question-card">

                <h4 id="questionText"></h4>

                <div class="mt-4">

                   <label class="answer-option">
    <input class="form-check-input" type="radio" name="answer" value="5">
    <span>Sangat Sesuai</span>
</label>

<label class="answer-option">
    <input class="form-check-input" type="radio" name="answer" value="4">
    <span>Sesuai</span>
</label>

<label class="answer-option">
    <input class="form-check-input" type="radio" name="answer" value="3">
    <span>Netral</span>
</label>

<label class="answer-option">
    <input class="form-check-input" type="radio" name="answer" value="2">
    <span>Tidak Sesuai</span>
</label>

<label class="answer-option">
    <input class="form-check-input" type="radio" name="answer" value="1">
    <span>Sangat Tidak Sesuai</span>
</label>
                    </div>

                </div>

            </div>

            <div class="row mt-4">

                <div class="col">
                    <button class="btn btn-secondary w-100"
                            onclick="previousQuestion()">
                        Sebelumnya
                    </button>
                </div>

                <div class="col">
                    <button class="btn btn-success w-100"
                            onclick="nextQuestion()">
                        Selanjutnya
                    </button>
                </div>

            </div>

        </div>

        <!-- Selesai -->
        <div id="finishSection" style="display:none">

            <div class="text-center">

                <h2>Terima Kasih</h2>

                <p>
                    Jawaban Anda telah berhasil direkam.
                </p>

                <p>
                    Tim Yayasan Badak Indonesia akan menghubungi kandidat yang memenuhi kriteria pada tahapan selanjutnya.
                </p>

            </div>

        </div>

    </div>

</div>

<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
